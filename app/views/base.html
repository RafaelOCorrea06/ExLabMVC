<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Biblioteca{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page-wrapper">
        <header class="site-header">
            <div class="container header-content">
                <a href="{{ url_for('livro_bp.index') }}" class="brand">
                    <div class="brand-logo">B</div>
                    <div class="brand-text">
                        <span class="brand-title">Biblioteca</span>
                        <span class="brand-subtitle">Sistema de catálogo</span>
                    </div>
                </a>

                <nav class="main-nav">
                    <a href="{{ url_for('livro_bp.index') }}">Início</a>
                    <a href="{{ url_for('livro_bp.catalogo') }}">Catálogo</a>
                    <a href="{{ url_for('livro_bp.novo_livro') }}" class="nav-button">Cadastrar livro</a>
                </nav>
            </div>
        </header>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
